<div class="forgot-psw-wrapper">
	<h1>Password dimenticata ?</h1>
	<p class="sub">
		Inserisci il tuo username e clicca il pulsante per ricevere una mail e
		reimpostare la tua password
	</p>

	<form [formGroup]="resetPswFg" (ngSubmit)="sendReq()">
		<span class="input-wrapper p-float-label">
			<input
				id="username"
				type="text"
				pInputText
				[formControl]="userFC"
				[required]="true"
			/>
			<label for="username">Username</label>
		</span>

		<div class="error-msg">
			@if (userFC.invalid && userFC.touched) {
				<span>Username richiesto</span>
			}
		</div>

		<button pButton pRipple type="submit" [disabled]="!resetPswFg.valid">
			Reimposta
		</button>
	</form>
</div>
