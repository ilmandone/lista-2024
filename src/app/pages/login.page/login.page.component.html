<picture class="hero">
	<source media="(min-width:1440px)" srcset="https://picsum.photos/1920/1080"/>
	<source media="(min-width:768px)" srcset="https://picsum.photos/1024/768"/>
	<img
		class="hero__img"
		ngSrc="https://picsum.photos/480/640"
		alt="Decorative image for login page"
		fill="true"
		priority="true"
	/>
</picture>
<main>
	<div class="main-section">
		<h1>Tati's list</h1>

		<form [formGroup]="loginFG" (ngSubmit)="login()">
			<span class="input-wrapper p-float-label">
			  <input
				  id="username"
				  type="text"
				  pInputText
				  [class.be-error]="beErrors.user"
				  [formControl]="userFC"
				  [required]="true"
				  (focus)="resetBeError('user')"
			  />
			  <label for="username">Username</label>
			</span>

			<div class="error-msg">
				@if (userFC.invalid && userFC.touched) {
					<span>Username richiesto</span>
				} @else if (beErrors.user) {
					<span>{{ beErrors.user }}</span>
				}
			</div>

			<span class="input-wrapper p-float-label">
			  <input
				  id="password"
				  type="password"
				  pInputText
				  [class.be-error]="beErrors.psw"
				  [formControl]="pswFC"
				  (focus)="resetBeError('psw')"
			  />
			  <label for="password">Password</label>
			</span>

			<div class="error-msg">
				@if (pswFC.invalid && pswFC.touched) {
					<span>Password richiesta</span>
				} @else if (beErrors.psw) {
					<span>{{ beErrors.psw }}</span>
				}
			</div>

			<button pButton pRipple type="submit" [disabled]="loginFG.invalid || loggingIn">
				{{loggingIn ? 'Logging in' : 'Login'}}
			</button>
		</form>
	</div>


	<!--  Forgot password-->
	<a class="forgot-password" [routerLink]="'/forgot-password'">Password dimenticata ?</a>

</main>
