<picture class="hero">
  <source media="(min-width:1440px)" srcset="https://picsum.photos/1920/1080"/>
  <source media="(min-width:768px)" srcset="https://picsum.photos/1024/768"/>
  <img
    class="hero__img"
    ngSrc="https://picsum.photos/480/640"
    alt="Decorative image for login page"
    fill="true"
    priority="true"
  />
</picture>
<main>
  <h1>Tati's list</h1>

  <form [formGroup]="loginFG" (ngSubmit)="login()">
    <span class="input-wrapper p-float-label">
      <input
        id="username"
        type="text"
        pInputText
        [formControl]="userFC"
        [required]="true"
      />
      <label for="username">Username</label>
    </span>

    @if (userFC.invalid && userFC.touched) {
      <div class="error-msg">Username richiesto</div>
    } @else {
      <div class="error-ph"></div>
    }

    <span class="input-wrapper p-float-label">
      <input id="password" type="password" pInputText [formControl]="pswFC"/>
      <label for="password">Password</label>
    </span>

    @if (pswFC.invalid && pswFC.touched) {
      <div class="error-msg">Password richiesta</div>
    } @else {
      <div class="error-ph"></div>
    }

    <button pButton pRipple type="submit" [disabled]="loginFG.invalid">
      Login
    </button>
  </form>
</main>
