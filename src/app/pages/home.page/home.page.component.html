<app-side-menu
	[(visible)]="mainMenuOpen"
	(action)="sideMenuAction($event)"
></app-side-menu>

<header>
	<p-button
		[icon]="mainMenuOpen ? 'pi pi-times' : 'pi pi-bars'"
		[text]="true"
		(onClick)="mainMenuOpen = true"
	></p-button>

	<!--Show full header if we have a list at last-->
	@if (showFullHeader) {
		<h1>DASHBOARD</h1>
		@if (!editMode) {
			<p-button
				icon="pi pi-pencil"
				[text]="true"
				(onClick)="enableEditing()"
			></p-button>
		} @else {
			<p-button
				icon="pi pi-plus"
				[text]="true"
				(onClick)="showDialog = 'new'"
			></p-button>
		}
	}
</header>

<main>
	@if (listData) {
		@if (listData.data.length > 0) {
			<ul class="lists">
				@for (list of listData.data; track list["UUID"]) {
					<li>
						<app-list
							[editMode]="editMode"
							[label]="list.label"
							[updated]="list.updated"
							(delete)="deleteItem(list)"
							(pointerDown)="!editMode && gotoList(list.UUID)"
							(doublePointerDown)="editMode && showDialogForRename(list)"
						></app-list>
					</li>
				}
			</ul>
		} @else {
			<section class="no-lists-available">
				<div class="message">
					@if (editMode) {
						<h1>Attenzione !</h1>
					} @else {
						<h1>Ciao</h1>
					}

					<p>Nessuna lista disponibile</p>
					@if (!editMode) {
						<p-button
							label="Crea la prima lista"
							(onClick)="showDialog = 'new'"
						></p-button>
					}
				</div>
			</section>
		}
	}
</main>

<app-dialog-new
	[(visible)]="!!showDialog"
	[header]="showDialog === 'new'? 'Nuova lista' : 'Rinomina la lista'"
	[enabled]="dialogInputFC.valid"
	(action)="dialogAction($event)"
>
	<form [formGroup]="dialogFG" (ngSubmit)="submitDialogForm()">
		<span class="input-wrapper p-float-label">
			<input type="hidden" [formControl]="dialogHiddenFC">
			<input
				id="new-list"
				type="text"
				pInputText
				[formControl]="dialogInputFC"
			/>
			<label for="new-list">{{showDialog === 'new' ? 'Aggiungi una lista' : 'Nuovo nome' }}</label>
		</span>
	</form>
</app-dialog-new>
