<app-side-menu
	[(visible)]="mainMenuOpen"
	(action)="sideMenuAction($event)"
></app-side-menu>

<div class="container">
	<header>
		<p-button
			[icon]="mainMenuOpen ? 'pi pi-times' : 'pi pi-bars'"
			[text]="true"
			(onClick)="mainMenuOpen = true"
		></p-button>

		<!--Show full header if we have a list at last-->
		@if (showFullHeader) {
			<h1>DASHBOARD</h1>
			@if (editMode === false) {
				<p-button
					icon="pi pi-pencil"
					[text]="true"
					(onClick)="editMode = true"
				></p-button>
			} @else {
				<p-button
					icon="pi pi-plus"
					[text]="true"
					(onClick)="showNewListDialog = true"
				></p-button>
			}
		}
	</header>

	<main>
		@if ((lists$ | async)?.data; as lists) {
			@if (lists.length > 0) {
				<ul class="lists">
					@for (list of lists; track list["UUID"]) {
						<li>
							<app-list
								[label]="list.label"
								[updated]="list.updated"
							></app-list>
						</li>
					}
				</ul>
			} @else {
				<section class="no-lists-available">
					<div class="message">
						<h1>Benvenuto</h1>
						<p>Nessuna lista disponibile</p>
						<p-button
							label="Crea la prima lista"
							(onClick)="showNewListDialog = true"
						></p-button>
					</div>
				</section>
			}
		}
	</main>

	<app-footer-actions class="footer-actions"></app-footer-actions>
</div>

<app-dialog-new
	[(visible)]="showNewListDialog"
	[header]="'Nuova lista'"
	[enabled]="newListFC.valid"
	(action)="newListDialogAction($event)"
>
	<form [formGroup]="newListFG" (ngSubmit)="submitNewList()">
		<span class="input-wrapper p-float-label">
			<input
				id="new-list"
				type="text"
				pInputText
				[formControl]="newListFC"
			/>
			<label for="new-list">Aggiungi una lista</label>
		</span>
	</form>
</app-dialog-new>

<app-loader [visible]="loading"></app-loader>
