<!--<div class="label">{{ label }}</div>-->
<p-button
	class="label-button"
	[ngClass]="{active: editMode}"
	[text]="true"
	[label]="label"></p-button>
<div class="right">
	@if (editMode) {
		<p-button
			icon="pi pi-trash"
			[text]="true"
			(onClick)="delete.emit()"
		></p-button>
	} @else {
		<div class="updated">{{ updated | date: "short" }}</div>
	}
</div>
