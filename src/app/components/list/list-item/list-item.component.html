<div class="left">
	@if (editMode) {
		<p-button
			class="list-drag-handler"
			icon="pi pi-sort"
			[text]="true"
		></p-button>
	}
	<p-button
		class="label-button"
		[ngClass]="{ active: editMode }"
		[text]="true"
		[label]="label"
	></p-button>
</div>

<div class="right">
	@if (editMode) {
		<p-button
			icon="pi pi-trash"
			[text]="true"
			(onClick)="delete.emit()"
		></p-button>
	} @else {
		<div class="updated">{{ updated | date: "short" }}</div>
	}
</div>
